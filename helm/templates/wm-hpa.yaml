

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hpa-wm-passthru-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wm-passthru-app
  minReplicas: {{ .Values.minReplicas }}
  maxReplicas: {{ .Values.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: {{ .Values.targetUtilizationType }}
      target:
        type: Utilization
        averageUtilization: {{ .Values.targetAverageUtilization }}

